server {
    listen 80;
    server_name _;
    
    # Global streaming settings
    proxy_buffering off;
    proxy_cache off;
    client_max_body_size 100M;

    # Serve UI (Static files)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        
        # No cache for HTML
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    
        # Cache للملفات الثابتة
        location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public";
        }
    }

    # Backend API - with explicit streaming settings
    location /api/ {
        proxy_pass http://fastapi:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Force streaming mode - MUST come first
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_temp_path /dev/null;
        
        # HTTP settings
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Increase timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        
        # Disable any content length checks that might interfere
        chunked_transfer_encoding off;
    }

    # Metrics (optional)
    location /metrics {
        proxy_pass http://fastapi:8000/metrics;
    }
}
